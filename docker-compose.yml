services:
  db:
    image: postgres:15-alpine
    container_name: obras-e-projetos-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: obras-e-projetos-db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: